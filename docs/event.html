<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CountMeIn Pro – Open Event</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #7C3AED, #4A90D9); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 40px 30px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
    h1 { font-size: 28px; color: #1A1A2E; margin-bottom: 8px; }
    p { font-size: 16px; color: #6B7280; margin-bottom: 24px; line-height: 1.5; }
    .btn { display: inline-block; width: 100%; padding: 16px; border-radius: 12px; font-size: 17px; font-weight: 700; text-decoration: none; margin-bottom: 12px; }
    .btn-primary { background: #7C3AED; color: #fff; }
    .btn-secondary { background: #F3E8FF; color: #7C3AED; }
    .logo { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">&#10003;</div>
    <h1>CountMeIn Pro</h1>
    <p>You've been invited to an event! Open the app to view details and sign up.</p>
    <a id="openApp" class="btn btn-primary" href="#">Open in App</a>
    <a id="appStore" class="btn btn-secondary" href="https://apps.apple.com/app/countmein-pro/id__APP_ID__">Download on the App Store</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('id');
    const deepLink = eventId ? 'countmeinpro://event/' + eventId : 'countmeinpro://';
    document.getElementById('openApp').href = deepLink;
    // Try to open the app automatically
    if (eventId) {
      window.location.href = deepLink;
    }
  </script>
</body>
</html>
